<!DOCTYPE html>
<html>

<body>

    Username<input id="username" type="text" value="dario.salvi@mau.se"><br>
    Password<input id="password" type="text" value="this is a long passphrase"><br>
    <button id="register">Register User</button><br><br><br>
    <button id="login">Login</button><br><br><br>
    <textarea id="message"></textarea>
    <button id="encrypt">Send message</button><br>
    <button id="decrypt">Get message</button>

    <script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>

    <script type="module">
        import {
            generateMasterKey,
            generatePrivatePublicKeys,
            getKeyFromPassword,
            wrapKey,
            unwrapKey,
            extractKey,
            sign,
            encrypt,
            decrypt,
            bytesToString,
            stringToBytes
        } from "./crypto.js"

        import API from "./api.js"

        let registerBtn = document.getElementById("register")
        let usernameInp = document.getElementById("username")
        let passwordInp = document.getElementById("password")

        let loginBtn = document.getElementById("login")

        let messageInp = document.getElementById("message")
        let encryptBtn = document.getElementById("encrypt")
        let decryptBtn = document.getElementById("decrypt")

        let MK

        registerBtn.addEventListener('click', async () => {
            // use the password to derive an AES key
            let username = usernameInp.value
            let password = passwordInp.value
            console.log('Registering uname: ' + username + ', pwd: ' + password)

            console.log('generating master key ...')
            let masterKey = await generateMasterKey()
            console.log(masterKey)

            let userProfile = {
            }
            console.log('encrypting the user profile ...')
            const { cipher, iv } = await encrypt(JSON.stringify({
                username
            }), masterKey)

            userProfile.encrypted = {
                data: cipher,
                iv: iv
            }
            console.log(userProfile)

            console.log('deriving a symmetric key ...')

            let aeskey = await getKeyFromPassword(password, username)
            console.log(aeskey)

            console.log('exporting wrapped master key ...')
            //now we encrypt the public, the private and the master keys with this derived key
            let wrapped = await wrapKey(masterKey, aeskey)
            let wrappedMKJson = {
                key: bytesToString(wrapped.wrappedKey),
                iv: bytesToString(wrapped.iv)
            }
            console.log(wrappedMKJson)

            console.log('generating public and private keys ...')
            // it is important to combine both uname and pwd 
            // else one can find a pwd by trying to login with all sorts of combinations until hitting one
            // TODO: maybe more clever ways of combining these 2 together?
            let seed = username + password
            let pp = await generatePrivatePublicKeys(seed)
            console.log(pp)

            console.log('exporting public key  ...')
            let publicJson = await extractKey(pp.publicKey)
            console.log(publicJson)

            API.registerUser(publicJson, wrappedMKJson, userProfile)
        })

        loginBtn.addEventListener('click', async () => {
            let password = passwordInp.value
            let username = usernameInp.value
            console.log('uname: ' + username + ', pwd: ' + password)

            console.log('generating keys ...')
            let aeskey = await getKeyFromPassword(password, username)
            let seed = username + password
            let pp = await generatePrivatePublicKeys(seed)

            console.log('logging in ...')
            let publicJson = await extractKey(pp.publicKey)
            let challenge = API.loginStartChallenge(publicJson)
            // sign
            let signature = await sign(pp.privateKey, challenge)
            let profileEncr = await API.completeChallenge(challenge, signature)
            console.log('logged in!', profileEncr)

            console.log('recovering MK ...')
            let wrappedMKJson = await API.getMasterKey()
            let recMK = stringToBytes(wrappedMKJson.key)
            let iv = stringToBytes(wrappedMKJson.iv)

            MK = await unwrapKey(recMK, iv, aeskey)
            console.log('master key recovered', MK)

            console.log('decripting profile ...')
            let profile = await decrypt(profileEncr.encrypted.data, MK, profileEncr.encrypted.iv)
            console.log('profile decripted', profile)
        })

        encryptBtn.addEventListener('click', async () => {
            console.log('encrypting message ...')
            let message = messageInp.value
            const { cipher, iv } = await encrypt(message, MK)

            console.log('sending message ...')
            await API.sendMessage(cipher, iv)
            console.log('message sent')
            messageInp.value = ''
        })

        decryptBtn.addEventListener('click', async () => {
            console.log('getting message ...')
            let msg = await API.getMessage()
            console.log(msg)
            console.log('decrypting message ...')
            let decryptedTxt = await decrypt(msg.message, MK, msg.iv)
            messageInp.value = decryptedTxt
            console.log("message decrypted", decryptedTxt)
        })


    </script>

</body>

</html>
