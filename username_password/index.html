<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>username_password</title>
</head>
<body>
    <!-- Registration Form -->
    <form id="registrationForm" onsubmit="event.preventDefault(); registerUser();">
        <div class="container">
            <h2>Register</h2>
            <label for="reg_uname"><b>Username</b></label>
            <input type="text" placeholder="Choose a Username" name="reg_uname" required>

            <br>
        
            <label for="reg_psw"><b>Password</b></label>
            <input type="password" placeholder="Choose a Password" name="reg_psw" required>

            <br>

            <button type="submit">Register</button>
        </div>
    </form>

    <!-- Login Form -->
    <form id="loginForm" onsubmit="event.preventDefault(); logInUser();">
        <div class="container">
            <h2>Login</h2>
            <label for="login_uname"><b>Username</b></label>
            <input type="text" placeholder="Enter Username" name="login_uname" required>

            <br>
        
            <label for="login_psw"><b>Password</b></label>
            <input type="password" placeholder="Enter Password" name="login_psw" required>

            <br>
        
            <button type="submit">Login</button>
        </div>
    </form>

    <p id="isLoggedIn">Not signed in.</p>

    <script>
        let users = []
        const loggedIn = document.getElementById("isLoggedIn");

        function registerUser() {
            let username = document.forms["registrationForm"]["reg_uname"].value;
            let password = document.forms["registrationForm"]["reg_psw"].value;

            if(username.length < 5) {
                alert("Username must be at least 5 characters long.");
                return false;
            }
            if(password.length < 8) {
                alert("Password must be at least 8 characters long.");
                return false;
            }

            var userExists = users.some(function(user) {
                return user.username === username;
            });

            if(userExists) {
                alert("Username already taken. Please choose another one.");
                return false;
            }

            users.push({username: username, password: password});
            alert("Registration successful!");

            document.forms["registrationForm"].reset();

            console.log(users)

        }

        function logInUser() {
            let username = document.forms["loginForm"]["login_uname"].value;
            let password = document.forms["loginForm"]["login_psw"].value;

            let userFound = users.find(user => user.username === username && user.password === password);
            if(userFound) {
                alert("Login successful!");
                console.log("Login succesful")
                loggedIn.textContent = `Signed in as ${userFound.username}!`;
            } else {
                alert("Invalid username or password.");
                loggedIn.textContent = `Username or Password invalid, try again.`
            }
        }
    </script>
</body>

<style>
    body {
        width: 80%;
        margin: auto;
    }
    button, input {
        display: block;
        margin: -1;
    }
        input[type="submit"] {
        display: block;
        margin: 1em 0;
    }
</style>
</html>
